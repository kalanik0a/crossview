name: Deploy landing site to GitHub Pages

# Publishes site/ to GitHub Pages. The hero GIFs are copied in from the repo at
# build time (so they aren't duplicated in the tree), and the OG/Twitter URLs are
# rewritten to the real Pages base URL so LinkedIn/GitHub link previews populate.
#
# One-time setup: repo → Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths: ["site/**", "examples/vulpy-engagement/assets/*.gif", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: pages
        uses: actions/configure-pages@v5
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r site/* _site/
          # bring in the hero GIFs (kept in the repo once, under examples/)
          cp examples/vulpy-engagement/assets/flow-graph.gif _site/ || true
          cp examples/vulpy-engagement/assets/kev-ticker.gif _site/ || true
          BASE="${{ steps.pages.outputs.base_url }}/"
          REPO="${{ github.server_url }}/${{ github.repository }}"
          # absolute URLs are required for OG/Twitter image + video scraping
          sed -i "s#__SITE_URL__#${BASE}#g; s#__REPO_URL__#${REPO}#g" _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
